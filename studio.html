<!DOCTYPE html>
<!--
  DEPRECATED — Do not deploy this file with client-side secrets.
  The writing studio lives at /studio in the Next.js app (web/).
  Legacy CMS code was removed in P4-T5; use server-side auth + service role only.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio — Moved</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dgbyoqvpt/image/upload/q_auto/f_auto/v1780357025/Screenshot_17_ofwahe.png">
    <!-- Redirect to Next.js studio when served on the same domain (e.g. selimc.tech/studio) -->
    <meta http-equiv="refresh" content="0;url=/studio">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-font-smoothing: antialiased; }
        body {
            background: #0a0a0a;
            color: rgba(255,255,255,0.85);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .notice {
            max-width: 420px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 48px 40px;
            background: #111;
        }
        .notice-logo {
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            margin-bottom: 32px;
        }
        .notice h1 {
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.75rem;
            font-weight: 400;
            color: #fff;
            margin-bottom: 12px;
        }
        .notice p {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.4);
            line-height: 1.6;
            margin-bottom: 28px;
        }
        .notice a {
            display: inline-block;
            padding: 12px 24px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            border-radius: 4px;
        }
        .notice a:hover { opacity: 0.88; }
        .notice small {
            display: block;
            margin-top: 24px;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="notice">
        <div class="notice-logo">ABU MD. SELIM · STUDIO</div>
        <h1>Studio has moved</h1>
        <p>The writing studio is now at <strong>/studio</strong> with secure server-side authentication. You will be redirected automatically.</p>
        <a href="/studio">Go to Studio</a>
        <small>Legacy studio.html is deprecated and must not contain secrets.</small>
    </div>
    <script>
        // Same-domain redirect when Next app is deployed alongside or instead of static files
        if (window.location.pathname.endsWith('studio.html')) {
            window.location.replace('/studio');
        }
    </script>
</body>
</html>
